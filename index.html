<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MIS學習庫">
<meta name="theme-color" content="#12122a">
<title>MIS 技術英文學習庫</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f1ed;--surface:#fff;--surface2:#ebebE4;--surface3:#e0dfd8;
  --text:#1a1a1a;--text2:#5a5a5a;--text3:#9a9a9a;
  --accent:#12122a;--accent2:#2d3a8c;--accent-light:#eef0fb;
  --green:#0d6b3f;--green-bg:#e4f5ec;--green-border:#b8e8cc;
  --amber:#8a5500;--amber-bg:#fdf3dc;--amber-border:#f5d98a;
  --red:#8a1515;--red-bg:#fdeaea;--red-border:#f5b8b8;
  --blue:#0a4d8a;--blue-bg:#e8f2fd;--blue-border:#b8d8f5;
  --purple:#5a2080;--purple-bg:#f3eafd;--purple-border:#d4b8f5;
  --radius:16px;--radius-sm:10px;--radius-xs:7px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
  --tab-h:60px;
}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:calc(var(--tab-h) + 20px)}

/* HEADER */
.header{background:var(--accent);color:#fff;padding:48px 18px 16px;position:sticky;top:0;z-index:200}
.hrow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.hicon{width:36px;height:36px;background:rgba(255,255,255,0.12);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.htitle{font-size:17px;font-weight:700;letter-spacing:.2px}
.hsub{font-size:11px;opacity:.55;margin-top:1px}
.hstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.hstat{background:rgba(255,255,255,0.08);border-radius:10px;padding:8px 10px;text-align:center}
.hstat-val{font-size:20px;font-weight:700}
.hstat-lbl{font-size:10px;opacity:.6;margin-top:1px}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;opacity:.6;margin-bottom:5px}
.prog-wrap{background:rgba(255,255,255,0.15);border-radius:99px;height:5px;overflow:hidden}
.prog-fill{height:100%;background:rgba(255,255,255,0.8);border-radius:99px;transition:width .5s ease}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:1px solid rgba(0,0,0,0.08);display:flex;height:var(--tab-h);padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;cursor:pointer;color:var(--text3);transition:color .2s;font-size:10px;font-weight:600}
.nav-btn.active{color:var(--accent2)}
.nav-icon{font-size:20px;line-height:1}

/* CONTENT */
.content{padding:14px 14px 0;max-width:500px;margin:0 auto}

/* SEARCH BAR */
.search-wrap{position:relative;margin-bottom:14px}
.search-input{width:100%;padding:11px 14px 11px 40px;border-radius:var(--radius-sm);border:1.5px solid transparent;background:var(--surface);font-size:14px;color:var(--text);outline:none;transition:border-color .2s;box-shadow:var(--shadow)}
.search-input:focus{border-color:var(--accent2)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3)}

/* FILTER PILLS */
.filters{display:flex;gap:7px;overflow-x:auto;margin-bottom:14px;scrollbar-width:none;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.pill{padding:6px 13px;border-radius:99px;border:1.5px solid rgba(0,0,0,0.1);background:var(--surface);font-size:12px;font-weight:700;color:var(--text2);white-space:nowrap;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* VOCAB CARDS */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid rgba(0,0,0,0.07);margin-bottom:9px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s}
.card-hdr{padding:13px 15px;display:flex;align-items:center;gap:11px;cursor:pointer}
.card-ico{font-size:19px;flex-shrink:0;width:26px;text-align:center}
.card-main{flex:1;min-width:0}
.card-en{font-size:14px;font-weight:700;font-family:'SF Mono',Menlo,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-zh{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.tag{padding:3px 7px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:.3px}
.te{background:var(--red-bg);color:var(--red)}
.tc{background:var(--amber-bg);color:var(--amber)}
.tb{background:var(--green-bg);color:var(--green)}
.tu{background:var(--blue-bg);color:var(--blue)}
.chev{font-size:10px;color:var(--text3);transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.card-body{padding:0 15px 14px;border-top:1px solid var(--bg)}
.dblock{margin-top:10px;border-radius:var(--radius-xs);padding:9px 11px}
.dblock.cause{background:var(--amber-bg);border-left:3px solid #f0a020}
.dblock.fix{background:var(--green-bg);border-left:3px solid #2eaa70}
.dblock.note{background:var(--amber-bg);border-left:3px solid #e09000}
.dblock.kw{background:var(--purple-bg);border-left:3px solid #8b5cf6}
.dblock.path{background:var(--surface2);border-left:3px solid #aaa}
.dblock.rec{background:var(--blue-bg);border-left:3px solid #2d8af0}
.dlbl{font-size:10px;font-weight:800;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.dval{font-size:13px;color:var(--text);line-height:1.5}
.dval.mono{font-family:'SF Mono',Menlo,monospace;font-size:12px;background:rgba(0,0,0,0.04);padding:5px 8px;border-radius:6px;white-space:pre-wrap;word-break:break-all}
.card-actions{display:flex;gap:8px;margin-top:12px}
.btn-learn{flex:1;padding:9px;border-radius:var(--radius-xs);border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-learn.done{background:var(--green-bg);color:var(--green)}
.btn-learn.todo{background:var(--accent);color:#fff}
.btn-journal{padding:9px 12px;border-radius:var(--radius-xs);border:1.5px solid rgba(0,0,0,0.1);background:var(--surface2);font-size:12px;font-weight:700;color:var(--text2);cursor:pointer}

/* AI SCAN */
.ai-box{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--accent2);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.ai-title{font-size:14px;font-weight:700;color:var(--accent2);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.ai-textarea{width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,0.1);border-radius:var(--radius-xs);font-size:13px;color:var(--text);background:var(--bg);font-family:inherit;resize:none;outline:none;line-height:1.5;min-height:80px}
.ai-textarea:focus{border-color:var(--accent2)}
.ai-btn{width:100%;margin-top:9px;padding:11px;background:var(--accent2);color:#fff;border:none;border-radius:var(--radius-xs);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.ai-btn:active{opacity:.8}
.ai-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-result{margin-top:12px;border-radius:var(--radius-xs);overflow:hidden}
.ai-result-hdr{background:var(--accent);color:#fff;padding:9px 12px;font-size:12px;font-weight:700}
.ai-result-body{padding:10px 12px;background:var(--surface2);font-size:13px;color:var(--text);line-height:1.7}
.ai-result-actions{display:flex;gap:8px;padding:10px 12px;background:var(--surface2);border-top:1px solid var(--bg)}
.ai-save-btn{flex:1;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-xs);font-size:12px;font-weight:700;cursor:pointer}
.ai-journal-btn{padding:8px 12px;background:var(--surface3);color:var(--text2);border:none;border-radius:var(--radius-xs);font-size:12px;font-weight:700;cursor:pointer}
.scan-tip{font-size:12px;color:var(--text3);margin-top:8px;line-height:1.5;text-align:center}

/* ADD VOCAB */
.add-vocab-btn{width:100%;padding:12px;background:var(--surface);border:1.5px dashed rgba(0,0,0,0.15);border-radius:var(--radius);font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;margin-bottom:12px;transition:all .2s}
.add-vocab-btn:active{background:var(--surface2)}
.vocab-form{background:var(--surface);border-radius:var(--radius);border:2px solid var(--accent2);padding:15px;margin-bottom:12px}
.flbl{font-size:11px;font-weight:800;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.4px}
.finput{width:100%;padding:9px 11px;border:1.5px solid rgba(0,0,0,0.1);border-radius:var(--radius-xs);font-size:13px;color:var(--text);background:var(--bg);margin-bottom:10px;font-family:inherit;outline:none}
.finput:focus{border-color:var(--accent2)}
.fselect{width:100%;padding:9px 11px;border:1.5px solid rgba(0,0,0,0.1);border-radius:var(--radius-xs);font-size:13px;color:var(--text);background:var(--bg);margin-bottom:10px;font-family:inherit;outline:none;-webkit-appearance:none}
.fbtns{display:flex;gap:8px}
.fbtn-save{flex:1;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-xs);font-size:13px;font-weight:700;cursor:pointer}
.fbtn-cancel{padding:10px 14px;background:var(--surface2);color:var(--text2);border:none;border-radius:var(--radius-xs);font-size:13px;font-weight:700;cursor:pointer}

/* EMPTY */
.empty{text-align:center;padding:44px 20px;color:var(--text3);font-size:14px;line-height:1.7}

/* WEEK PLAN */
.week-card{background:var(--surface);border-radius:var(--radius);border:1px solid rgba(0,0,0,0.07);margin-bottom:11px;overflow:hidden;box-shadow:var(--shadow)}
.week-hdr{padding:13px 15px;display:flex;align-items:center;gap:9px}
.week-badge{padding:4px 10px;border-radius:7px;font-size:11px;font-weight:800}
.week-title{font-size:14px;font-weight:700}
.week-body{padding:0 15px 13px}
.day-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--bg)}
.day-row:last-child{border-bottom:none}
.day-num{width:22px;height:22px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--text3);flex-shrink:0}
.day-text{font-size:13px;color:var(--text)}
.tip-box{background:var(--blue-bg);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:13px;font-size:13px;color:var(--blue);line-height:1.5;border:1px solid var(--blue-border)}

/* JOURNAL */
.add-jbtn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;margin-bottom:13px}
.jform{background:var(--surface);border-radius:var(--radius);border:2px solid var(--accent2);padding:15px;margin-bottom:13px}
.jcard{background:var(--surface);border-radius:var(--radius);border:1px solid rgba(0,0,0,0.07);padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow)}
.jmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.jdate{font-size:12px;font-weight:700;color:var(--accent2)}
.jproblem{font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.5}
.jsolution{background:var(--green-bg);border-left:3px solid #2eaa70;border-radius:var(--radius-xs);padding:7px 10px;font-size:12px;color:var(--green);line-height:1.4}
.jkw{margin-top:7px;font-size:11px;color:var(--purple);font-weight:700}
.jcard-actions{display:flex;gap:7px;margin-top:9px}
.jcard-add-btn{padding:6px 11px;background:var(--accent-light);color:var(--accent2);border:none;border-radius:var(--radius-xs);font-size:11px;font-weight:700;cursor:pointer}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border-radius:var(--radius-sm);padding:14px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,0.06)}
.stat-val{font-size:28px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:3px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.week-stat-card{background:var(--surface);border-radius:var(--radius);padding:15px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,0.06);margin-bottom:11px}
.wstat-title{font-size:14px;font-weight:700;margin-bottom:12px}
.wstat-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.wstat-lbl{font-size:12px;color:var(--text2);width:60px;flex-shrink:0}
.wstat-bar-wrap{flex:1;background:var(--surface2);border-radius:99px;height:7px;overflow:hidden}
.wstat-bar{height:100%;border-radius:99px;transition:width .5s ease}
.wstat-num{font-size:12px;font-weight:700;color:var(--text2);width:28px;text-align:right;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--tab-h) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* AI LOADING */
.ai-loading{display:flex;align-items:center;gap:8px;padding:12px;color:var(--text3);font-size:13px}
.dots span{animation:dot 1.2s infinite;opacity:0;display:inline-block}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:0}40%{opacity:1}}

/* CAMERA */
.mode-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mode-btn{padding:11px;border-radius:var(--radius-sm);border:1.5px solid rgba(0,0,0,0.1);background:var(--surface);font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .2s;text-align:center}
.mode-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.camera-zone{background:var(--surface);border-radius:var(--radius);border:2px dashed rgba(0,0,0,0.15);padding:24px 16px;text-align:center;margin-bottom:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.camera-zone:active{background:var(--surface2)}
.camera-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.camera-icon{font-size:40px;margin-bottom:10px}
.camera-label{font-size:14px;font-weight:700;color:var(--accent2);margin-bottom:4px}
.camera-sub{font-size:12px;color:var(--text3)}
.preview-wrap{position:relative;margin-bottom:12px;border-radius:var(--radius-sm);overflow:hidden;background:var(--surface2)}
.preview-img{width:100%;max-height:220px;object-fit:contain;display:block}
.preview-close{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
</style>
</head>
<body>

<div class="header" id="appHeader">
  <div class="hrow">
    <div class="hicon">🖥</div>
    <div>
      <div class="htitle">MIS 技術英文學習庫</div>
      <div class="hsub">每天15分鐘，累積實戰能力</div>
    </div>
  </div>
  <div class="hstats">
    <div class="hstat"><div class="hstat-val" id="s-total">0</div><div class="hstat-lbl">總詞彙</div></div>
    <div class="hstat"><div class="hstat-val" id="s-learned">0</div><div class="hstat-lbl">已學會</div></div>
    <div class="hstat"><div class="hstat-val" id="s-week">0</div><div class="hstat-lbl">本週新增</div></div>
  </div>
  <div class="prog-lbl"><span>學習進度</span><span id="prog-pct">0%</span></div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('lookup')" id="nav-lookup">
    <span class="nav-icon">🔍</span>速查表
  </button>
  <button class="nav-btn" onclick="switchTab('scan')" id="nav-scan">
    <span class="nav-icon">📷</span>AI解析
  </button>
  <button class="nav-btn" onclick="switchTab('plan')" id="nav-plan">
    <span class="nav-icon">📅</span>計畫
  </button>
  <button class="nav-btn" onclick="switchTab('journal')" id="nav-journal">
    <span class="nav-icon">📝</span>日誌
  </button>
  <button class="nav-btn" onclick="switchTab('stats')" id="nav-stats">
    <span class="nav-icon">📊</span>統計
  </button>
</div>

<div class="content" id="content"></div>
<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────
const BUILTIN = [
  {id:'e0',en:'permission denied',zh:'沒有權限執行此動作',tag:'錯誤訊息',cause:'使用者權限不足，缺少 sudo 或 root 權限',fix:'sudo cp file /etc/\n（在指令前加 sudo）',keyword:'sudo / 權限'},
  {id:'e1',en:'connection refused',zh:'連線被拒絕，服務沒開或被防火牆擋',tag:'錯誤訊息',cause:'SSH 服務未啟動，或 UFW 封鎖了該 port',fix:'systemctl status ssh\nufw allow 22',keyword:'SSH / 防火牆'},
  {id:'e2',en:'no space left on device',zh:'磁碟空間已滿',tag:'錯誤訊息',cause:'log 檔或資料填滿磁區',fix:'df -h\ndu -sh /*',keyword:'磁碟空間 / df'},
  {id:'e3',en:'command not found',zh:'指令未安裝或路徑錯誤',tag:'錯誤訊息',cause:'套件未安裝或 PATH 未設定',fix:'which [指令]\napt install [套件名]',keyword:'安裝 / PATH'},
  {id:'e4',en:'failed to start [service]',zh:'服務啟動失敗',tag:'錯誤訊息',cause:'設定檔錯誤或相依套件缺少',fix:'journalctl -xe',keyword:'systemctl / journalctl'},
  {id:'e5',en:'timeout',zh:'連線或回應超時',tag:'錯誤訊息',cause:'網路不通或服務回應太慢',fix:'ping [IP]\nsystemctl status [service]',keyword:'網路 / 逾時'},
  {id:'c0',en:'Port',zh:'SSH 使用的連接埠號碼',tag:'設定檔',note:'預設22，可改成其他號碼降低被掃描風險',path:'/etc/ssh/sshd_config',keyword:'連接埠 / port'},
  {id:'c1',en:'PermitRootLogin',zh:'是否允許 root 帳號直接 SSH 登入',tag:'設定檔',note:'建議設為 no，用一般帳號登入再 sudo',path:'/etc/ssh/sshd_config',keyword:'root / 安全'},
  {id:'c2',en:'PasswordAuthentication',zh:'是否允許密碼方式 SSH 登入',tag:'設定檔',note:'改用金鑰登入後設為 no，更安全',path:'/etc/ssh/sshd_config',keyword:'密碼 / 金鑰'},
  {id:'c3',en:'workgroup',zh:'Samba 工作群組名稱',tag:'設定檔',note:'需與 Windows 網路芳鄰一致，通常是 WORKGROUP',path:'/etc/samba/smb.conf',keyword:'工作群組'},
  {id:'c4',en:'listen',zh:'Nginx 監聽的 port 號',tag:'設定檔',note:'80 是 HTTP，443 是 HTTPS',path:'/etc/nginx/sites-available/default',keyword:'監聽 / port'},
  {id:'c5',en:'server_name',zh:'這個 Nginx 設定對應的域名',tag:'設定檔',note:'例：server_name mis.company.com',path:'/etc/nginx/sites-available/default',keyword:'域名 / 虛擬主機'},
  {id:'b0',en:'Virtualization Technology (VT-x)',zh:'虛擬化支援',tag:'BIOS',note:'跑 Proxmox、VMware 必須開啟，否則無法建 VM',recommend:'開啟',location:'Advanced → CPU Configuration',keyword:'虛擬化 / VM'},
  {id:'b1',en:'Hyper-Threading',zh:'超執行緒',tag:'BIOS',note:'讓每個 CPU 核心模擬兩個執行緒，提升多工效能',recommend:'開啟',location:'Advanced → CPU Configuration',keyword:'CPU / 多工'},
  {id:'b2',en:'Secure Boot',zh:'安全開機',tag:'BIOS',note:'安裝 Ubuntu / Linux 時有時需要關閉才能開機',recommend:'視情況關閉',location:'Boot → Secure Boot',keyword:'安全開機 / Linux'},

let custom = JSON.parse(localStorage.getItem('mis_custom')||'[]');
let learned = JSON.parse(localStorage.getItem('mis_learned')||'[]');
let journal = JSON.parse(localStorage.getItem('mis_journal')||'[]');
let activeTab = 'lookup';
let activeFilter = '全部';
let searchQ = '';
let expanded = null;
let showAddForm = false;
let showJForm = false;
let aiResult = null;
let aiLoading = false;
let prefillJournal = null;
let scanMode = 'photo';
let capturedImage = null;

function save(){
  localStorage.setItem('mis_custom', JSON.stringify(custom));
  localStorage.setItem('mis_learned', JSON.stringify(learned));
  localStorage.setItem('mis_journal', JSON.stringify(journal));
}

function allItems(){ return [...BUILTIN, ...custom]; }

function tagClass(tag){
  if(tag==='錯誤訊息') return 'te';
  if(tag==='設定檔') return 'tc';
  if(tag==='BIOS') return 'tb';
  return 'tu';
}

// ─── PROGRESS ───────────────────────────────────────────
function updateProgress(){
  const total = allItems().length;
  const done = learned.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-learned').textContent = done;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
  const weekNew = journal.filter(j=>new Date(j.date)>=weekAgo).length;
  document.getElementById('s-week').textContent = weekNew;
}

// ─── TOAST ──────────────────────────────────────────────
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}

// ─── TAB SWITCH ─────────────────────────────────────────
function switchTab(tab){
  activeTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  expanded = null; showAddForm = false; showJForm = false;
  render();
}

// ─── RENDER ─────────────────────────────────────────────
function render(){
  const el = document.getElementById('content');
  if(activeTab==='lookup') el.innerHTML = renderLookup();
  else if(activeTab==='scan') el.innerHTML = renderScan();
  else if(activeTab==='plan') el.innerHTML = renderPlan();
  else if(activeTab==='journal') el.innerHTML = renderJournal();
  else el.innerHTML = renderStats();
  updateProgress();
}

// ─── LOOKUP ─────────────────────────────────────────────
function renderLookup(){
  const filters = ['全部','錯誤訊息','設定檔','BIOS','自訂'];
  let items = allItems();
  if(searchQ) items = items.filter(i=>
    i.en.toLowerCase().includes(searchQ.toLowerCase())||
    i.zh.includes(searchQ)||
    (i.keyword&&i.keyword.includes(searchQ))
  );
  if(activeFilter!=='全部') {
    if(activeFilter==='自訂') items = items.filter(i=>custom.find(c=>c.id===i.id));
    else items = items.filter(i=>i.tag===activeFilter);
  }

  let html = `<div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" placeholder="搜尋英文、中文、關鍵字..." value="${searchQ}"
      oninput="searchQ=this.value;render()" id="search-inp">
  </div>`;

  html += `<div class="filters">`+filters.map(f=>
    `<button class="pill ${activeFilter===f?'active':''}" onclick="activeFilter='${f}';render()">${f}</button>`
  ).join('')+`</div>`;

  if(showAddForm) html += renderAddForm();
  else html += `<button class="add-vocab-btn" onclick="showAddForm=true;render()">＋ 新增自訂詞彙</button>`;

  if(!items.length){
    html += `<div class="empty">找不到「${searchQ||activeFilter}」相關詞彙<br>可以用 AI解析 功能新增！</div>`;
    return html;
  }

  html += items.map(item=>{
    const isL = learned.includes(item.id);
    const isO = expanded===item.id;
    let body = '';
    if(isO){
      body = `<div class="card-body">`;
      if(item.cause) body+=`<div class="dblock cause"><div class="dlbl">發生原因</div><div class="dval">${item.cause}</div></div>`;
      if(item.note) body+=`<div class="dblock note"><div class="dlbl">說明</div><div class="dval">${item.note}</div></div>`;
      if(item.fix) body+=`<div class="dblock fix"><div class="dlbl">解決指令</div><div class="dval mono">${item.fix}</div></div>`;
      if(item.recommend) body+=`<div class="dblock rec"><div class="dlbl">建議設定</div><div class="dval">${item.recommend}</div></div>`;
      if(item.location) body+=`<div class="dblock path"><div class="dlbl">BIOS 位置</div><div class="dval">${item.location}</div></div>`;
      if(item.path) body+=`<div class="dblock path"><div class="dlbl">設定檔路徑</div><div class="dval mono">${item.path}</div></div>`;
      if(item.keyword) body+=`<div class="dblock kw"><div class="dlbl">記憶關鍵字</div><div class="dval">${item.keyword}</div></div>`;
      body+=`<div class="card-actions">
        <button class="btn-learn ${isL?'done':'todo'}" onclick="toggleLearn('${item.id}')">
          ${isL?'✓ 已學會（點擊取消）':'標記已學會'}
        </button>
        <button class="btn-journal" onclick="addToJournal('${item.id}')">記錄日誌</button>
      </div></div>`;
    }
    return `<div class="card">
      <div class="card-hdr" onclick="expanded=expanded==='${item.id}'?null:'${item.id}';render()">
        <div class="card-ico">${isL?'✅':'📌'}</div>
        <div class="card-main">
          <div class="card-en">${item.en}</div>
          <div class="card-zh">${item.zh}</div>
        </div>
        <div class="card-right">
          <span class="tag ${tagClass(item.tag)}">${item.tag}</span>
          <span class="chev ${isO?'open':''}">▼</span>
        </div>
      </div>${body}</div>`;
  }).join('');
  return html;
}

    <input class="finput" type="text" id="vf-en" placeholder="例：no route to host">

function renderScan(){
  let resultHtml = '';
  if(aiLoading){
    resultHtml=`<div class="ai-loading">🤖 AI 解析中<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`;
  } else if(aiResult){
    resultHtml=`<div class="ai-result">
      <div class="ai-result-hdr">🤖 AI 解析結果</div>
      <div class="ai-result-body">${aiResult.display}</div>
      <div class="ai-result-actions">

  }

    ${capturedImage ? `

        <div class="camera-label">點擊拍照或選擇圖片</div>

      </div>`}
    <button class="ai-btn" onclick="runAIPhoto()" ${!capturedImage||aiLoading?'disabled':''}>
      ${aiLoading?'解析中...':'🤖 AI 辨識圖片'}
    </button>` : `
    <textarea class="ai-textarea" id="ai-input" placeholder="貼上你看不懂的英文錯誤訊息、BIOS 選項、設定檔內容..."></textarea>
    <button class="ai-btn" onclick="runAIText()" ${aiLoading?'disabled':''}>
      ${aiLoading?'解析中...':'🤖 AI 解析文字'}
    </button>`;

  return `
  <div class="mode-toggle">
    <button class="mode-btn ${photoTab?'active':''}" onclick="scanMode='photo';aiResult=null;render()">📷 拍照辨識</button>
    <button class="mode-btn ${!photoTab?'active':''}" onclick="scanMode='text';aiResult=null;render()">📋 貼上文字</button>
  </div>
  <div class="ai-box">
    <div class="ai-title">${photoTab?'📷 拍照或上傳圖片，AI 自動辨識':'📋 貼上文字，AI 自動解析'}</div>
    ${inputHtml}
    ${resultHtml}
  </div>
  ${photoTab?`<div class="tip-box" style="margin-top:0">
    💡 <strong>支援的圖片類型：</strong><br>
    • Linux / Server 錯誤訊息截圖<br>
    • BIOS 設定畫面照片<br>
    • 設定檔內容截圖<br>
    • VMware / 虛擬機畫面<br>
    • 任何看不懂的英文技術畫面
  </div>`:''}`;
}

function handlePhoto(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    capturedImage = e.target.result;
    aiResult = null;
    render();
  };
  reader.readAsDataURL(file);
}

async function runAIPhoto(){
  if(!capturedImage){ toast('請先拍照或選擇圖片'); return; }
  aiLoading=true; aiResult=null; render();
  try{
    const base64 = capturedImage.split(',')[1];
    const mimeMatch = capturedImage.match(/data:([^;]+);/);
    const mediaType = mimeMatch ? mimeMatch[1] : 'image/jpeg';
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`你是一位資深 MIS 工程師助理，專門幫台灣 MIS 人員解析技術英文畫面。
用戶會上傳圖片（可能是 Linux 錯誤訊息截圖、BIOS 畫面照片、設定檔截圖、VMware 畫面等）。
請先識別圖片中的英文技術內容，然後用繁體中文回答，格式如下：
【畫面內容】簡短描述這張圖片是什麼畫面
【中文意思】核心英文內容的中文說明
【發生原因】為什麼會出現這個（如果是錯誤的話，否則省略）
【解決方法】具體指令或操作步驟（如果是錯誤的話，否則說明用途）
【記憶關鍵字】2-4個關鍵字，用 / 分隔
【分類】只能填其中一個：錯誤訊息 / 設定檔 / BIOS / 其他
請保持簡潔，每項不超過2行。`,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
          {type:'text',text:'請辨識這張圖片並解析其中的技術英文內容。'}
        ]}]
      })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text||'';
    aiResult = parseAIResponse(raw, '（見圖片）');
  } catch(e){
    aiResult={display:'解析失敗，請確認網路連線後再試。',en:'',zh:'',keyword:'',tag:'其他'};
  }
  aiLoading=false; render();
}

async function runAIText(){
  const text = document.getElementById('ai-input')?.value?.trim();
  if(!text){toast('請先貼上要解析的文字');return;}
  aiLoading=true; aiResult=null; render();
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`你是一位資深 MIS 工程師助理，專門幫台灣 MIS 人員解析技術英文。
用戶會貼上他們看不懂的英文文字（可能是 Linux 錯誤訊息、BIOS 選項、設定檔內容）。
請用繁體中文回答，格式如下：
【中文意思】一句話說明這是什麼
【發生原因】為什麼會出現這個（如果是錯誤的話）
【解決方法】具體指令或操作步驟（如果是錯誤的話）
【記憶關鍵字】2-4個關鍵字，用 / 分隔
【分類】只能填其中一個：錯誤訊息 / 設定檔 / BIOS / 其他
請保持簡潔，每項不超過2行。`,
        messages:[{role:'user',content:`請解析這段英文：\n${text}`}]
      })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text||'';
    aiResult = parseAIResponse(raw, text.split('\n')[0].slice(0,60));
  } catch(e){
    aiResult={display:'解析失敗，請確認網路連線後再試。',en:'',zh:'',keyword:'',tag:'其他'};
  }
  aiLoading=false; render();
}

function parseAIResponse(raw, fallbackEn){
  const parse = (label)=>{
    const m = raw.match(new RegExp('【'+label+'】([\\s\\S]*?)(?=【|$)'));
    return m ? m[1].trim() : '';
  };
  return {
    raw,
    display: raw.replace(/【([^】]+)】/g,'<strong style="color:var(--accent2)">【$1】</strong><br>').replace(/\n/g,'<br>'),
    zh: parse('中文意思'),
    cause: parse('發生原因'),
    fix: parse('解決方法'),
    keyword: parse('記憶關鍵字'),
    tag: parse('分類')||'其他',
    en: parse('畫面內容')||fallbackEn,
  };
}

function saveAiToVocab(){
  if(!aiResult||!aiResult.en) return;
  custom.push({
    id:'ai'+Date.now(),
    en: aiResult.en, zh: aiResult.zh||'（見解析內容）',

    fix: aiResult.fix,
    keyword: aiResult.keyword,
  });
  save(); aiResult=null; toast('✓ 已加入速查表'); render();
}

function saveAiToJournal(){

  prefillJournal={problem: aiResult.en, solution: aiResult.fix, keyword: aiResult.keyword};
  switchTab('journal'); showJForm=true; render();
}

function addJournalToVocab(id){

}

function renderStats(){
  const total=allItems().length, done=learned.length;
  const pct=total?Math.round(done/total*100):0;
  const tagCounts={錯誤訊息:0,設定檔:0,BIOS:0,自訂:0};
  const learnedByTag={錯誤訊息:0,設定檔:0,BIOS:0,自訂:0};
  allItems().forEach(i=>{
    const t=custom.find(c=>c.id===i.id)?'自訂':i.tag;
    tagCounts[t]=(tagCounts[t]||0)+1;
    if(learned.includes(i.id)) learnedByTag[t]=(learnedByTag[t]||0)+1;
  });
  const today=new Date(); const weekAgo=new Date(); weekAgo.setDate(today.getDate()-7);
  const weekJ=journal.filter(j=>new Date(j.date)>=weekAgo).length;
  const monthJ=journal.filter(j=>{const d=new Date(j.date);return d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();}).length;

  let tagBars='';
  Object.entries(tagCounts).forEach(([tag,cnt])=>{
    if(!cnt) return;
    const ld=learnedByTag[tag]||0;
    const pct=cnt?Math.round(ld/cnt*100):0;
    const color=tag==='錯誤訊息'?'#e24b4a':tag==='設定檔'?'#f0a020':tag==='BIOS'?'#2eaa70':'#2d8af0';
    tagBars+=`<div class="wstat-row">
      <div class="wstat-lbl">${tag}</div>
      <div class="wstat-bar-wrap"><div class="wstat-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="wstat-num">${ld}/${cnt}</div>
    </div>`;
  });

  return `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">總詞彙數</div><div class="stat-sub">含 ${custom.length} 個自訂</div></div>
    <div class="stat-card"><div class="stat-val">${pct}%</div><div class="stat-lbl">學習進度</div><div class="stat-sub">${done} 個已學會</div></div>
    <div class="stat-card"><div class="stat-val">${weekJ}</div><div class="stat-lbl">本週日誌</div><div class="stat-sub">過去7天</div></div>
    <div class="stat-card"><div class="stat-val">${monthJ}</div><div class="stat-lbl">本月日誌</div><div class="stat-sub">本月累計</div></div>
  </div>
  <div class="week-stat-card">
    <div class="wstat-title">各分類學習進度</div>
    ${tagBars}
  </div>
  <div class="week-stat-card">
    <div class="wstat-title">日誌統計</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.8">
      總記錄筆數：<strong>${journal.length} 筆</strong><br>
      本週新增：<strong>${weekJ} 筆</strong><br>
      本月新增：<strong>${monthJ} 筆</strong><br>
      自訂詞彙：<strong>${custom.length} 個</strong>
    </div>
  </div>`;
}

// ─── INIT ────────────────────────────────────────────────
render();
setTimeout(()=>{
  const h=document.getElementById('appHeader');
  if(h) document.documentElement.style.setProperty('--header-h',h.offsetHeight+'px');
},100);
window.addEventListener('resize',()=>{
  const h=document.getElementById('appHeader');
  if(h) document.documentElement.style.setProperty('--header-h',h.offsetHeight+'px');
});
</script>
</body>
</html>
